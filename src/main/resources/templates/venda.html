<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salvou - Registrar Nova Venda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/menu :: navbar('venda')}"></div>
<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold text-primary mb-1">Venda</h1>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4 shadow-sm border-0 bg-white mb-4" style="border-radius: 16px;">
                <h5 class="fw-bold text-secondary mb-3">Informações Operacionais</h5>

                <div class="mb-3">
                    <label class="form-label fw-medium">Vendedor Responsável:</label>
                    <select id="selectVendedor" class="form-select">
                        <option value="Henrique Rocha">Henrique Rocha</option>
                        <option value="Beatriz Silva">Beatriz Silva</option>
                        <option value="Carlos Souza">Carlos Souza</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-medium">Cliente:</label>
                    <select id="selectCliente" class="form-select">
                        <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-medium">Forma de Pagamento:</label>
                    <select id="formaPagamento" class="form-select">
                        <option value="PIX">    PIX</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
            </div>

            <div class="card p-4 shadow-sm border-0 bg-white" style="border-radius: 16px;">
                <h5 class="fw-bold text-secondary mb-3">Adicionar Serviços/Produtos</h5>

                <div class="mb-3">
                    <label class="form-label fw-medium">Selecione o Item:</label>
                    <select id="selectServico" class="form-select">
                        <option value="" data-preco="0">-- Escolha um item --</option>
                        <option th:each="s : ${servicos}"
                                th:value="${s.id}"
                                th:text="${s.nome} + ' - R$ ' + ${#numbers.formatDecimal(s.preco, 1, 2)}"
                                th:data-preco="${s.preco}"
                                th:data-nome="${s.nome}"></option>
                    </select>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-medium">Quantidade:</label>
                        <input type="number" id="inputQuantidade" class="form-select" value="1" min="1">
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-medium">Desconto Unitário (R$):</label>
                        <input type="number" id="inputDesconto" class="form-select" value="0.00" min="0" step="0.01">
                    </div>
                </div>

                <button type="button" id="btnAdicionar" class="btn btn-primary w-100 fw-medium rounded-pill">+ Inserir no Carrinho</button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card p-4 shadow-sm border-0 bg-white h-100 d-flex flex-column justify-content-between" style="border-radius: 16px;">
                <div>
                    <h5 class="fw-bold text-secondary mb-3">Carrinho</h5>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light small text-uppercase">
                            <tr>
                                <th>Item</th>
                                <th class="text-center">Qtd</th>
                                <th class="text-end">Preço Unit.</th>
                                <th class="text-end">Desc.</th>
                                <th class="text-end">Subtotal</th>
                                <th class="text-center">Ação</th>
                            </tr>
                            </thead>
                            <tbody id="corpoCarrinho">
                            <tr id="linhaVazia">
                                <td colspan="6" class="text-center py-4 text-muted small">Nenhum item adicionado ao carrinho.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="border-top pt-4 mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted fw-medium">Subtotal Bruto:</span>
                        <span class="fw-semibold text-secondary" id="txtSubtotal">R$ 0,00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted fw-medium">Total de Descontos:</span>
                        <span class="fw-semibold text-danger" id="txtDescontoTotal">- R$ 0,00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fs-5 fw-bold text-dark">Valor Líquido a Pagar:</span>
                        <span class="fs-4 fw-bold text-success" id="txtTotalLiquido">R$ 0,00</span>
                    </div>
                    <button type="button" id="btnFinalizar" class="btn btn-success w-100 py-2 fw-bold rounded-pill fs-5" disabled>
                        Finalizar e Salvar Venda
                    </button>
                </div>

            </div>
        </div>
    </div>

</div>

<script>
    let carrinho = [];

    const btnAdicionar = document.getElementById("btnAdicionar");
    const btnFinalizar = document.getElementById("btnFinalizar");
    const selectServico = document.getElementById("selectServico");
    const inputQuantidade = document.getElementById("inputQuantidade");
    const inputDesconto = document.getElementById("inputDesconto");
    const corpoCarrinho = document.getElementById("corpoCarrinho");

    btnAdicionar.addEventListener("click", () => {
        const option = selectServico.options[selectServico.selectedIndex];
        const id = option.value;
        const nome = option.getAttribute("data-nome");
        const preco = parseFloat(option.getAttribute("data-preco")) || 0;
        const qtd = parseInt(inputQuantidade.value) || 1;
        const desc = parseFloat(inputDesconto.value) || 0;

        if (!id) {
            alert("Selecione um produto ou serviço válido!");
            return;
        }

        // Calcula valores do item
        const subtotal = (preco - desc) * qtd;

        // Adiciona ao array do carrinho
        carrinho.push({ id, nome, preco, qtd, desc, subtotal });

        atualizarInterfaceCarrinho();

        // Limpa campos de entrada
        selectServico.value = "";
        inputQuantidade.value = "1";
        inputDesconto.value = "0.00";
    });

    function atualizarInterfaceCarrinho() {
        if (carrinho.length === 0) {
            corpoCarrinho.innerHTML = `<tr id="linhaVazia"><td colspan="6" class="text-center py-4 text-muted small">Nenhum item adicionado ao carrinho.</td></tr>`;
            btnFinalizar.disabled = true;
            document.getElementById("txtSubtotal").innerText = "R$ 0,00";
            document.getElementById("txtDescontoTotal").innerText = "- R$ 0,00";
            document.getElementById("txtTotalLiquido").innerText = "R$ 0,00";
            return;
        }

        document.getElementById("linhaVazia")?.remove();
        corpoCarrinho.innerHTML = "";

        let bruto = 0;
        let descontos = 0;
        let liquido = 0;

        carrinho.forEach((item, index) => {
            bruto += (item.preco * item.qtd);
            descontos += (item.desc * item.qtd);
            liquido += item.subtotal;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="fw-semibold text-dark">${item.nome}</td>
                <td class="text-center fw-medium">${item.qtd}</td>
                <td class="text-end text-muted">R$ ${item.preco.toFixed(2).replace('.', ',')}</td>
                <td class="text-end text-danger">- R$ ${item.desc.toFixed(2).replace('.', ',')}</td>
                <td class="text-end fw-bold text-secondary">R$ ${item.subtotal.toFixed(2).replace('.', ',')}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-danger py-0 px-2 rounded-pill" onclick="removerItem(${index})">❌</button>
                </td>
            `;
            corpoCarrinho.appendChild(tr);
        });

        document.getElementById("txtSubtotal").innerText = `R$ ${bruto.toFixed(2).replace('.', ',')}`;
        document.getElementById("txtDescontoTotal").innerText = `- R$ ${descontos.toFixed(2).replace('.', ',')}`;
        document.getElementById("txtTotalLiquido").innerText = `R$ ${liquido.toFixed(2).replace('.', ',')}`;
        btnFinalizar.disabled = false;
    }

    function removerItem(index) {
        carrinho.splice(index, 1);
        atualizarInterfaceCarrinho();
    }

    btnFinalizar.addEventListener("click", () => {
        const clienteId = document.getElementById("selectCliente").value;
        const vendedorNome = document.getElementById("selectVendedor").value;
        const totalLiquidoStr = document.getElementById("txtTotalLiquido").innerText
            .replace("R$ ", "").replace(".", "").replace(",", ".");

        // Mapeia os IDs dos serviços comprados
        const servicosIds = carrinho.map(item => parseInt(item.id));

        // Estrutura o JSON para enviar ao Spring Boot
        const payload = {
            cliente: clienteId ? { id: parseInt(clienteId) } : null,
            vendedor: vendedorNome,
            servicos: servicosIds.map(id => ({ id: id })),
            valorTotal: parseFloat(totalLiquidoStr)
        };

        btnFinalizar.disabled = true;
        btnFinalizar.innerText = "Processando transação...";

        fetch('/vendas/salvar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(res => {
                if (res.ok) {
                    alert("🎉 Venda registrada com sucesso no Salvou CRM!");
                    window.location.href = "/resumo";
                } else {
                    alert("Erro ao salvar a transação.");
                    btnFinalizar.disabled = false;
                    btnFinalizar.innerText = "💸 Finalizar e Salvar Venda";
                }
            });
    });
</script>
</body>
</html>
